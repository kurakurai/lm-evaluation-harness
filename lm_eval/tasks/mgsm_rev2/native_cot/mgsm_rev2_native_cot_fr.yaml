dataset_name: fr
doc_to_target: '{{answer_number|string}}'
doc_to_text: "Réfléchissez étape par étape, puis donnez «Réponse: <nombre>».\n{{question}}"
filter_list:
- filter:
  - function: regex
    group_select: -1
    regex_pattern: '(\-?\d[\d.,]*)'
  - function: take_first
  - function: normalize_number
  name: flexible-extract
generation_kwargs:
  do_sample: false
  until:
  - 'Question :'
  - </s>
  - <|im_end|>
include: cot_yaml
task: mgsm_rev2_native_cot_fr
